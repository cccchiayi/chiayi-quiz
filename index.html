<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>文化＋1串！｜你是哪種嘉義文化串？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --cis-orange: #FF5500;
  --cis-yellow: #FFE100;
  --cis-green:  #44D62C;
  --cis-blue:   #00B2FF;
  --cis-pink:   #FF3FB6;
  --cream: #FFF8EF;
  --warm-white: #FFFDF7;
  --dark: #1A0A00;
  --mid: #7A3A00;
  --stick: #8B4513;
  --font: 'Noto Sans TC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--cream); color: var(--dark); min-height: 100vh; }

/* ── 共用 ── */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }
.btn-primary {
  display: block; width: 100%; background: var(--cis-orange); color: white;
  font-family: var(--font); font-size: 17px; font-weight: 900; padding: 16px;
  border-radius: 100px; border: none; cursor: pointer; text-align: center;
  letter-spacing: 0.04em; box-shadow: 0 4px 0 #CC3300; transition: transform 0.1s;
}
.btn-primary:active { transform: translateY(3px); box-shadow: none; }
.btn-secondary {
  display: block; width: 100%; background: transparent; color: var(--mid);
  font-family: var(--font); font-size: 14px; font-weight: 700; padding: 12px;
  border-radius: 100px; border: 1.5px solid rgba(122,58,0,0.25); cursor: pointer; text-align: center;
}

/* ══════════════════════════════
   封面頁
══════════════════════════════ */
#screen-cover { background: var(--cream); }
.cover-topbar {
  background: var(--cis-orange); padding: 16px 20px 14px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.cover-brand-excl { font-size: 28px; font-weight: 900; color: var(--cis-yellow); line-height: 1; }
.cover-brand-name { font-size: 16px; font-weight: 900; color: white; letter-spacing: 0.04em; }
.cover-yellow-bar { height: 16px; background: var(--cis-yellow); flex-shrink: 0; }
.cover-body { flex: 1; position: relative; padding: 28px 24px 100px; }
.cover-skewer {
  position: absolute; top: 20px; right: 24px;
  display: flex; flex-direction: column; align-items: center; z-index: 2;
}
.sk-stick { width: 4px; background: var(--stick); border-radius: 2px; }
.sk-ball {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2.5px solid white; margin: 3px 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.cover-tag {
  display: inline-block; background: var(--cis-yellow); color: var(--dark);
  font-size: 12px; font-weight: 900; padding: 4px 14px;
  border-radius: 100px; margin-bottom: 16px; letter-spacing: 0.06em;
}
.cover-title { font-size: 30px; font-weight: 900; line-height: 1.25; margin-bottom: 10px; }
.cover-title .accent { color: var(--cis-orange); }
.cover-subtitle { font-size: 14px; color: var(--mid); line-height: 1.7; }
.cover-chars { display: flex; flex-wrap: wrap; gap: 10px; padding: 32px 0 0; }
.cover-char {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; border: 3px solid white;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
}
.cover-cta {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 16px 24px 32px;
  background: linear-gradient(to top, var(--cream) 70%, transparent);
}

/* ══════════════════════════════
   題目頁
══════════════════════════════ */
#screen-question { background: var(--warm-white); }
.q-header { background: var(--cis-orange); padding: 14px 20px 12px; flex-shrink: 0; }
.q-prog-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.75); letter-spacing: 0.08em; margin-bottom: 8px; }
.q-prog-track { height: 6px; background: rgba(255,255,255,0.25); border-radius: 100px; overflow: hidden; }
.q-prog-fill { height: 100%; background: var(--cis-yellow); border-radius: 100px; transition: width 0.4s ease; }
.q-box {
  background: var(--cis-orange); padding: 20px 20px 36px; flex-shrink: 0;
  clip-path: ellipse(120% 100% at 50% 0%);
}
.q-num { font-size: 11px; font-weight: 900; color: var(--cis-yellow); letter-spacing: 0.1em; margin-bottom: 8px; }
.q-text { font-size: 18px; font-weight: 900; color: white; line-height: 1.5; }
.q-options { padding: 28px 20px 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
.q-option {
  background: white; border: 2px solid rgba(255,85,0,0.18);
  border-radius: 18px; padding: 14px 18px;
  display: flex; align-items: center; gap: 14px; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.q-option:hover { border-color: rgba(255,85,0,0.4); }
.q-option.selected { border-color: var(--cis-orange); background: #FFF2EB; }
.opt-radio {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid rgba(255,85,0,0.3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.q-option.selected .opt-radio { background: var(--cis-orange); border-color: var(--cis-orange); }
.opt-radio::after {
  content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; opacity: 0;
}
.q-option.selected .opt-radio::after { opacity: 1; }
.opt-text { font-size: 14px; font-weight: 700; color: var(--dark); line-height: 1.5; }
.q-footer { padding: 8px 20px 36px; display: flex; justify-content: flex-end; }
.btn-next {
  background: var(--cis-orange); color: white; font-family: var(--font);
  font-size: 15px; font-weight: 900; padding: 12px 28px;
  border-radius: 100px; border: none; cursor: pointer;
  box-shadow: 0 3px 0 #CC3300; transition: transform 0.1s; opacity: 0.4; pointer-events: none;
}
.btn-next.ready { opacity: 1; pointer-events: auto; }
.btn-next:active { transform: translateY(2px); box-shadow: none; }

/* ══════════════════════════════
   結果頁
══════════════════════════════ */
#screen-result { background: var(--cream); }
.r-header { padding: 20px 20px 18px; position: relative; flex-shrink: 0; }
.r-header-label { font-size: 11px; font-weight: 900; color: rgba(0,0,0,0.45); letter-spacing: 0.1em; margin-bottom: 6px; }
.r-char-name { font-size: 26px; font-weight: 900; line-height: 1.2; }
.r-rarity {
  position: absolute; top: 20px; right: 20px;
  background: var(--cis-yellow); color: var(--dark);
  font-size: 11px; font-weight: 900; padding: 4px 12px;
  border-radius: 100px; letter-spacing: 0.04em;
}
.r-icon-wrap {
  display: flex; justify-content: center; align-items: center;
  padding: 24px 0 16px; position: relative;
}
.r-skewer-line {
  position: absolute; top: 0; bottom: 0; left: 50%; width: 4px;
  transform: translateX(-50%);
  background: repeating-linear-gradient(to bottom, var(--stick) 0px, var(--stick) 20px, transparent 20px, transparent 26px);
  z-index: 0;
}
.r-char-icon {
  width: 96px; height: 96px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; border: 4px solid white;
  box-shadow: 0 6px 0 rgba(0,0,0,0.1); position: relative; z-index: 1;
}
.r-desc { padding: 4px 24px 0; font-size: 14px; color: var(--mid); line-height: 1.8; text-align: center; }
.r-quote {
  margin: 12px 20px; padding: 14px 18px;
  background: white; border-radius: 16px;
  border-left: 4px solid var(--cis-orange);
  font-size: 13px; font-weight: 700; color: var(--dark); line-height: 1.6;
}
.r-tags { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; }
.r-tag { font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 100px; background: #FFE8D6; color: #A33000; }
.r-section-title { font-size: 11px; font-weight: 900; color: var(--mid); letter-spacing: 0.08em; padding: 0 20px 8px; }
.r-sites { padding: 0 20px 12px; }
.r-site-card {
  display: flex; align-items: center; gap: 14px;
  background: white; border-radius: 16px; padding: 12px 16px;
  margin-bottom: 8px; border: 1px solid rgba(255,85,0,0.12);
  cursor: pointer; text-decoration: none;
}
.r-site-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.r-site-name { font-size: 14px; font-weight: 700; color: var(--dark); }
.r-site-arrow { margin-left: auto; color: var(--cis-orange); font-size: 18px; font-weight: 900; }
.r-pair-box { margin: 0 20px 12px; background: white; border-radius: 16px; padding: 14px 16px; border: 1px solid rgba(255,85,0,0.12); }
.r-pair-title { font-size: 11px; font-weight: 900; color: var(--mid); letter-spacing: 0.08em; margin-bottom: 12px; }
.r-pair-row { display: flex; gap: 16px; flex-wrap: wrap; }
.r-pair-item { display: flex; align-items: center; gap: 8px; }
.r-pair-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 2px solid white; }
.r-pair-name { font-size: 12px; font-weight: 700; color: var(--dark); }
.r-pair-compat { font-size: 10px; color: var(--mid); }
.r-footer { padding: 8px 20px 48px; display: flex; flex-direction: column; gap: 10px; }

/* ══════════════════════════════
   Admin 後台
══════════════════════════════ */
#screen-admin { background: #1A0A00; color: white; }
.admin-header {
  background: var(--cis-orange); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.admin-title { font-size: 16px; font-weight: 900; color: white; }
.admin-logout { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7); cursor: pointer; background: none; border: none; font-family: var(--font); }
.admin-body { padding: 20px; flex: 1; overflow-y: auto; }
.admin-card { background: rgba(255,255,255,0.07); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.admin-card-title { font-size: 12px; font-weight: 900; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; margin-bottom: 12px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; }
.stat-num { font-size: 24px; font-weight: 900; color: var(--cis-yellow); }
.stat-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.result-bar { margin-bottom: 10px; }
.result-bar-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.result-bar-track { height: 8px; background: rgba(255,255,255,0.1); border-radius: 100px; overflow: hidden; }
.result-bar-fill { height: 100%; background: var(--cis-orange); border-radius: 100px; transition: width 0.6s ease; }
.admin-table { width: 100%; font-size: 11px; border-collapse: collapse; }
.admin-table th { text-align: left; color: rgba(255,255,255,0.4); font-weight: 700; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.admin-table td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
.btn-export {
  background: rgba(255,255,255,0.1); color: white; font-family: var(--font);
  font-size: 13px; font-weight: 700; padding: 10px 20px;
  border-radius: 100px; border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer; width: 100%; margin-top: 8px;
}
.loading-text { color: rgba(255,255,255,0.4); font-size: 13px; text-align: center; padding: 20px; }

/* ══════════════════════════════
   Admin 登入
══════════════════════════════ */
#screen-login { background: #1A0A00; align-items: center; justify-content: center; }
.login-box { width: 100%; max-width: 360px; padding: 0 24px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .excl { font-size: 48px; font-weight: 900; color: var(--cis-orange); }
.login-logo .name { font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.6); margin-top: 8px; }
.login-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 8px; letter-spacing: 0.06em; }
.login-input {
  width: 100%; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 14px; padding: 14px 16px; font-family: var(--font); font-size: 16px;
  color: white; margin-bottom: 16px; outline: none;
}
.login-input:focus { border-color: var(--cis-orange); }
.login-err { color: #FF6B6B; font-size: 12px; font-weight: 700; margin-bottom: 12px; display: none; }
</style>
</head>
<body>

<!-- ══ 封面頁 ══ -->
<div id="screen-cover" class="screen active">
  <div class="cover-topbar">
    <span class="cover-brand-excl">！</span>
    <span class="cover-brand-name">文化＋1串</span>
  </div>
  <div class="cover-yellow-bar"></div>
  <div class="cover-body">
    <div class="cover-skewer">
      <div class="sk-stick" style="height:16px"></div>
      <div class="sk-ball" style="background:var(--cis-orange)"></div>
      <div class="sk-stick" style="height:8px"></div>
      <div class="sk-ball" style="background:var(--cis-yellow)"></div>
      <div class="sk-stick" style="height:8px"></div>
      <div class="sk-ball" style="background:var(--cis-green)"></div>
      <div class="sk-stick" style="height:8px"></div>
      <div class="sk-ball" style="background:var(--cis-blue)"></div>
      <div class="sk-stick" style="height:8px"></div>
      <div class="sk-ball" style="background:var(--cis-pink)"></div>
      <div class="sk-stick" style="height:16px"></div>
    </div>
    <div class="cover-tag">心理測驗</div>
    <div class="cover-title">你是哪種<br><span class="accent">嘉義文化串</span>？</div>
    <div class="cover-subtitle">8 種串燒個性<br>找到你的嘉義文化靈魂</div>
    <div class="cover-chars">
      <div class="cover-char" style="background:var(--cis-orange)">🍡</div>
      <div class="cover-char" style="background:var(--cis-yellow)">🍍</div>
      <div class="cover-char" style="background:#FF88CC">🍭</div>
      <div class="cover-char" style="background:#FF4422">🌶️</div>
      <div class="cover-char" style="background:#FFC040">🥚</div>
      <div class="cover-char" style="background:#FF6666">🍬</div>
      <div class="cover-char" style="background:#886644">🪵</div>
      <div class="cover-char" style="background:#AA44FF">🎰</div>
    </div>
  </div>
  <div class="cover-cta">
    <button class="btn-primary" onclick="startQuiz()">開始測驗 →</button>
  </div>
</div>

<!-- ══ 題目頁 ══ -->
<div id="screen-question" class="screen">
  <div class="q-header">
    <div class="q-prog-label" id="prog-label">Q1 / 9</div>
    <div class="q-prog-track"><div class="q-prog-fill" id="prog-fill" style="width:11%"></div></div>
  </div>
  <div class="q-box">
    <div class="q-num" id="q-num">Q.1</div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="q-options" id="q-options"></div>
  <div class="q-footer">
    <button class="btn-next" id="btn-next" onclick="nextQ()">下一題 →</button>
  </div>
</div>

<!-- ══ 結果頁 ══ -->
<div id="screen-result" class="screen">
  <div class="r-header" id="r-header">
    <div class="r-header-label">你的文化串類型</div>
    <div class="r-char-name" id="r-name"></div>
    <div class="r-rarity" id="r-rarity"></div>
  </div>
  <div class="r-icon-wrap">
    <div class="r-skewer-line"></div>
    <div class="r-char-icon" id="r-icon"></div>
  </div>
  <div class="r-desc" id="r-desc"></div>
  <div class="r-quote" id="r-quote"></div>
  <div class="r-tags" id="r-tags"></div>
  <div class="r-section-title">推薦你的文化基地</div>
  <div class="r-sites" id="r-sites"></div>
  <div class="r-pair-box">
    <div class="r-pair-title">你的串燒好夥伴</div>
    <div class="r-pair-row" id="r-pairs"></div>
  </div>
  <div class="r-footer">
    <button class="btn-primary" onclick="shareResult()">分享我的結果！</button>
    <button class="btn-secondary" onclick="retryQuiz()">再測一次</button>
  </div>
</div>

<!-- ══ Admin 登入 ══ -->
<div id="screen-login" class="screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="excl">！</div>
      <div class="name">文化＋1串 後台管理</div>
    </div>
    <div class="login-label">密碼</div>

    <button class="btn-primary" onclick="doLogin()">登入後台</button>
  </div>
</div>

<!-- ══ Admin 後台 ══ -->
<div id="screen-admin" class="screen">
  <div class="admin-header">
    <div class="admin-title">📊 數據後台</div>
    <button class="admin-logout" onclick="logout()">登出</button>
  </div>
  <div class="admin-body">
    <div class="admin-card">
      <div class="admin-card-title">總覽</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-num" id="stat-total">-</div><div class="stat-label">總答題人數</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-today">-</div><div class="stat-label">今日新增</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-types">8</div><div class="stat-label">串型種類</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-share">-</div><div class="stat-label">分享次數</div></div>
      </div>
    </div>
    <div class="admin-card">
      <div class="admin-card-title">各串型分佈</div>
      <div id="result-bars"><div class="loading-text">載入中...</div></div>
    </div>
    <div class="admin-card">
      <div class="admin-card-title">最近答題紀錄</div>
      <div id="recent-table"><div class="loading-text">載入中...</div></div>
      <button class="btn-export" onclick="exportCSV()">匯出 CSV</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════
// 資料設定
// ══════════════════════════════
const ADMIN_PASSWORD = 'ccc2026';

// Apps Script 網址 — 部署後填入
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

// 10 題題目 V5（嘉義串燒辦桌版）
// 維度：E/I（Q1,Q4,Q5）× J/P（Q2,Q6,Q9）× W/D（Q3,Q7,Q8,Q10）
const questions = [
  {
    id: 'Q1', dim: 'EI',
    text: '你打開 E-mail，收到嘉義一封神秘信件：「嘉義串燒辦桌」派對邀請，你會怎麼做？',
    opts: [
      { text: '丟到朋友大群問，有誰要一起去玩啊', val: 'E' },
      { text: '傳訊息問最好的朋友，要不要一起去', val: 'E' },
      { text: '覺得活動很有趣，還在考慮有沒有要去', val: 'I' },
      { text: '對「自己一人去」感到自在，準備出發', val: 'I' }
    ]
  },
  {
    id: 'Q2', dim: 'JP',
    text: '邀請卡上只有一個神秘 LOGO、活動時間、地點，你會怎樣做？',
    opts: [
      { text: '上網查出所有跟這個活動相關的資料，查完再決定要不要去', val: 'J' },
      { text: '既然要來嘉義了，順便安排嘉義一日遊行程', val: 'J' },
      { text: '打開地圖稍微查一下派對地點，查完就睡', val: 'P' },
      { text: '憑感覺，感覺這個神秘又有趣，就決定要去了', val: 'P' }
    ]
  },
  {
    id: 'Q3', dim: 'WD',
    text: '邀請卡上有一個問題，決定你被分配到什麼桌。它問你：火雞肉飯你是拌還是不拌派？',
    opts: [
      { text: '直接拌開，加調味料，吃得夠味最重要', val: 'W', sub: 'S' },
      { text: '拌！無論咖哩、還是火雞肉飯都要拌', val: 'W', sub: 'S' },
      { text: '先問老闆這家店的火雞肉飯有什麼故事', val: 'D', sub: 'H' },
      { text: '絕對不拌！一口一口慢慢吃', val: 'D', sub: 'L' }
    ]
  },
  {
    id: 'Q4', dim: 'EI',
    text: '到達「串燒辦桌」派對現場，有一群人正在門口排隊，你的狀態是？',

// 答題邏輯
// ══════════════════════════════
let scores = { E:0, I:0, J:0, P:0, W:0, D:0 };
let currentQ = 0;
let selectedOpt = null;
let answers = [];

function startQuiz() {
  scores = { E:0, I:0, J:0, P:0, W:0, D:0, sub_S:0, sub_V:0, sub_H:0, sub_L:0, sub_craft:0 };
  currentQ = 0; answers = [];
  showScreen('screen-question');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('prog-label').textContent = `Q${currentQ+1} / ${questions.length}`;
  document.getElementById('prog-fill').style.width = `${((currentQ)/questions.length)*100}%`;
  document.getElementById('q-num').textContent = `Q.${currentQ+1}`;
  document.getElementById('q-text').textContent = q.text;
  selectedOpt = null;
  document.getElementById('btn-next').classList.remove('ready');

  const container = document.getElementById('q-options');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'q-option';
    div.innerHTML = `<div class="opt-radio"></div><div class="opt-text">${opt.text}</div>`;
    div.onclick = () => selectOpt(i, div);
    container.appendChild(div);
  });
}

function selectOpt(idx, el) {
  document.querySelectorAll('.q-option').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  selectedOpt = idx;
  document.getElementById('btn-next').classList.add('ready');
}

function nextQ() {
  if (selectedOpt === null) return;
  const q = questions[currentQ];
  const opt = q.opts[selectedOpt];
  scores[opt.val] = (scores[opt.val] || 0) + 1;
  // 記錄子維度
  if (opt.sub) {
    scores['sub_' + opt.sub] = (scores['sub_' + opt.sub] || 0) + 1;
  }
  answers.push({ q: q.id, ans: selectedOpt, val: opt.val, sub: opt.sub || '' });
  currentQ++;
  if (currentQ >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function getResultKey() {
  // Step 1: E/I — Q1,Q4,Q5（各1分，共3分，≥2判定）
  const ei = scores.E >= 2 ? 'E' : 'I';

  // Step 2: J/P — Q2,Q6,Q9（各1分，共3分，≥2判定）
  const jp = scores.J >= 2 ? 'J' : 'P';

  // Step 3: W/D — Q3,Q7,Q8,Q10（各1分，共4分，≥3判定；平手看子維度）
  let wd;
  if (scores.W >= 3) wd = 'W';
  else if (scores.D >= 3) wd = 'D';
  else {
    // W=D=2，看子維度哪個多
    const subW = (scores.sub_S||0) + (scores.sub_V||0);
    const subD = (scores.sub_H||0) + (scores.sub_L||0) + (scores.sub_craft||0);
    wd = subW >= subD ? 'W' : 'D';
  }

  const key = ei + jp + wd;

  // IJW 無對應 → 看 E/I 分數導向最近的串
  if (key === 'IJW') {
    // I但差一點，導向 IPW（獨辣辣）
    return 'IPW';
  }

  // EPD → H歷史型 vs L慢旅型
  if (key === 'EPD') {
    const H = scores.sub_H || 0;
    const L = scores.sub_L || 0;
    return H >= L ? 'EPD2' : 'EPD';
  }

  return key;
}

function showResult() {
  const key = getResultKey();
  const r = results[key];
  document.getElementById('r-header').style.background = r.color;
  document.getElementById('r-name').textContent = r.name;
  document.getElementById('r-name').style.color = r.textColor;
  document.getElementById('r-rarity').textContent = `稀有度 ${r.rarity}`;
  document.getElementById('r-icon').textContent = r.icon;
  document.getElementById('r-icon').style.background = r.color;
  document.getElementById('r-desc').textContent = r.desc;
  document.getElementById('r-quote').textContent = r.quote;
  document.getElementById('r-tags').innerHTML = r.flags.map(f => `<span class="r-tag">${f}</span>`).join('');
  document.getElementById('r-sites').innerHTML = r.sites.map((s,i) =>
    `<div class="r-site-card"><div class="r-site-dot" style="background:${r.siteDots[i]}"></div><div class="r-site-name">${s}</div><div class="r-site-arrow">›</div></div>`
  ).join('');
  document.getElementById('r-pairs').innerHTML = r.goodWith.map(p =>
    `<div class="r-pair-item"><div class="r-pair-icon" style="background:${p.bg}">${p.icon}</div><div><div class="r-pair-name">${p.name.replace('\n','<br>')}</div><div class="r-pair-compat">超級契合 ♥</div></div></div>`
  ).join('');

  // 送出資料
  saveResult(key, r.name);
  showScreen('screen-result');
  window.scrollTo(0, 0);
}

function shareResult() {
  const key = getResultKey();
  const r = results[key];
  const text = `我是「${r.name}」${r.icon}（稀有度 ${r.rarity}）\n\n${r.quote}\n\n👉 來測測你是哪種嘉義文化串：${location.href}`;
  if (navigator.share) {
    navigator.share({ title: '你是哪種嘉義文化串？', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('已複製到剪貼簿！'));
  }
}

function retryQuiz() { startQuiz(); }

function saveResult(key, name) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'save',
      type: key,
      name,
      answers: JSON.stringify(answers),
      timestamp: new Date().toISOString(),
      ua: navigator.userAgent.substring(0, 100)
    })
  }).catch(() => {});
}

function renderAdminData(data) {
  document.getElementById('stat-total').textContent = data.total || 0;
  document.getElementById('stat-today').textContent = data.today || 0;
  document.getElementById('stat-share').textContent = data.shares || 0;

  const order = ['EJW','EJD','EPW','IPW','EPD','EPD2','IJD','IPD'];
  const names = { EJW:'麻吉兄弟糰糰串', EJD:'雞肉旺萊椒椒串', EPW:'繽紛棉花糖烤串', IPW:'獨辣辣串串香', EPD:'炭烤半熟蛋串', EPD2:'古早糖糖呼嚕串', IJD:'木熏職人雞肉串', IPD:'卡恰蹦蹦串' };
  const dist = data.distribution || {};
  const total = data.total || 1;
  document.getElementById('result-bars').innerHTML = order.map(k => {
    const cnt = dist[k] || 0;
    const pct = Math.round((cnt/total)*100);
    return `<div class="result-bar">
      <div class="result-bar-label"><span>${names[k]}</span><span>${cnt} (${pct}%)</span></div>
      <div class="result-bar-track"><div class="result-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const rows = (data.recent || []).slice(0, 10);
  if (rows.length) {
    document.getElementById('recent-table').innerHTML = `
      <table class="admin-table">
        <tr><th>時間</th><th>串型</th></tr>
        ${rows.map(r => `<tr><td>${r.time||''}</td><td>${r.name||r.type||''}</td></tr>`).join('')}
      </table>`;
  } else {
    document.getElementById('recent-table').innerHTML = '<div class="loading-text">尚無紀錄</div>';
  }
}

let allData = [];
function exportCSV() {
  if (!allData.length) { alert('尚無資料可匯出'); return; }
  const csv = ['時間,串型代碼,串型名稱,答題紀錄'].concat(
    allData.map(r => `${r.timestamp},${r.type},${r.name},"${r.answers||''}"`)
  ).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `chiayi_quiz_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

// ══════════════════════════════
// 畫面切換
// ══════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// URL hash 路由
function checkRoute() {
  if (location.hash === '#admin') { showScreen('screen-login'); }
}
window.addEventListener('hashchange', checkRoute);
checkRoute();
</script>
